##############################################
# APPLICATION
##############################################
spring.application.name=ExpenseManagement
server.port=8080

##############################################
# POSTGRESQL DATABASE
##############################################
spring.datasource.url=jdbc:postgresql://localhost:5432/enterprise_expense
spring.datasource.username=postgres
spring.datasource.password=griffin@2006
spring.datasource.driver-class-name=org.postgresql.Driver

##############################################
# JPA / HIBERNATE
##############################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

##############################################
# HIKARI CONNECTION POOL
##############################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

##############################################
# JWT
##############################################
jwt.secret=ReplaceWithAtLeast32CharacterLongSecretKey
jwt.expiration=3600000
jwt.refresh-expiration=604800000

##############################################
# MAIL (OTP)
##############################################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

##############################################
# FILE UPLOAD
##############################################
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=uploads/

##############################################
# CORS
##############################################
app.cors.allowed-origins=http://localhost:5173

##############################################
# LOGGING
##############################################
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.expense.ExpenseManagement=DEBUG

##############################################
# JACKSON
##############################################
spring.jackson.serialization.write-dates-as-timestamps=false

##############################################
# ACTUATOR (Optional)
##############################################
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always